#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "liberaforms"
name = "Liberaforms"
description.en = "Creat and manage simple web Forms"
description.fr = "Créer et gérer des formulaires web simples"

version = "4.9.3~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0-only"
website = "https://www.liberaforms.org"
admindoc = "https://docs.liberaforms.org"
code = "https://codeberg.org/LiberaForms/server"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["en", "eu", "es", "ca", "cs", "de", "fr", "gl", "ru", "ta"]
    default = "fr"

    [install.admin]
    type = "user"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://codeberg.org/LiberaForms/server/archive/v4.9.3.tar.gz"
    sha256 = "9ce3db1b0dfec0341bf4941d9d3e34d0848ec650117820d2680349f5cfba01cd"
    
    autoupdate.strategy = "latest_forgejo_tag"

    [resources.sources.uv]
    amd64.url = "https://github.com/astral-sh/uv/releases/download/0.11.24/uv-x86_64-unknown-linux-gnu.tar.gz"
    amd64.sha256 = "5ce1ad074a78f96c5c8122088bb85a12eb282195bc1453151a48762e4fc31fed"
    arm64.url = "https://github.com/astral-sh/uv/releases/download/0.11.24/uv-aarch64-unknown-linux-gnu.tar.gz"
    arm64.sha256 = "e22c66d36a0098b17cff80a8647e0b8c58202af899d4e9eb820fc7ad126435a1"
    armhf.url = "https://github.com/astral-sh/uv/releases/download/0.11.24/uv-armv7-unknown-linux-gnueabihf.tar.gz"
    armhf.sha256 = "b9ec27086af022b2962428beeb5d391903d663f3bd76fed3d8a39def1cc7fe19"
    i386.url = "https://github.com/astral-sh/uv/releases/download/0.11.24/uv-i686-unknown-linux-gnu.tar.gz"
    i386.sha256 = "e7444c509c01efb293d2e0c78d306ec2624aa9d1d63c7fed095e0a3e29800bb9"
    
    in_subdir = true
    
    autoupdate.strategy = "latest_github_release"
    autoupdate.upstream = "https://github.com/astral-sh/uv"
    autoupdate.asset.amd64 = "^uv-x86_64-unknown-linux-gnu.tar.gz$"
    autoupdate.asset.arm64 = "^uv-aarch64-unknown-linux-gnu.tar.gz$"
    autoupdate.asset.armhf = "^uv-armv7-unknown-linux-gnueabihf.tar.gz$"
    autoupdate.asset.i386 = "^uv-i686-unknown-linux-gnu.tar.gz$"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 5000

    [resources.apt]
    packages = "postgresql, python3-venv, python3-dev, gcc, libpq-dev, libcairo2, libffi-dev"

    packages_from_raw_bash = """
    if [[ $YNH_DEBIAN_VERSION == "bookworm" ]]; then
        echo "mime-support";
    elif [[ $YNH_DEBIAN_VERSION == "trixie" ]]; then
        echo "media-types mailcap";
    fi
    """

    [resources.database]
    type = "postgresql"
